# Kubernetes ServiceMonitor for Prometheus Operator
# Requires: Prometheus Operator (kube-prometheus-stack) installed in the cluster
# This is optional — only needed for Kubernetes deployments with Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pbx-server
  namespace: pbx-system
  labels:
    app: pbx-server
spec:
  selector:
    matchLabels:
      app: pbx-server
  endpoints:
    - port: http-api
      path: /metrics
      interval: 15s
      scheme: http  # Switch to https with tlsConfig if TLS is enabled
