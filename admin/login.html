<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- API Base URL - change this if your API server is on a different host/port -->
    <meta name="api-base-url" content="">
    <meta name="description" content="Sign in to Warden VoIP PBX administration panel.">
    <meta name="theme-color" content="#1a365d">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Warden VoIP Login</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/favicon-512.png">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="assets/images/warden-voip-logo.png" alt="Warden VoIP" class="logo">
            <h1>Warden VoIP</h1>
            <p>Enter your credentials to continue</p>
        </div>

        <div id="error-message" class="error-message" role="alert" aria-live="assertive"></div>

        <form id="login-form" aria-label="Login form">
            <div class="form-group">
                <label for="extension">Extension Number</label>
                <input
                    type="text"
                    id="extension"
                    name="extension"
                    placeholder="e.g., 1001"
                    required
                    pattern="[0-9]+"
                    maxlength="6"
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password" tabindex="-1">
                        👁
                    </button>
                </div>
            </div>

            <div class="remember-row">
                <label class="remember-label">
                    <input type="checkbox" id="remember-me" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" id="forgot-password-link" class="forgot-password-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-button" id="login-button">
                <span class="spinner"></span>
                <span class="button-text">Login</span>
            </button>
        </form>

        <div class="security-note">
            🔒 Your session is secured with encrypted authentication
        </div>
        
        <div id="troubleshooting" class="security-note troubleshooting-note">
            <strong>Connection Troubleshooting:</strong><br>
            <small id="troubleshooting-details"></small>
        </div>

        <div class="login-footer">
            PBX System v1.0
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
